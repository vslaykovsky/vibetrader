apiVersion: v1
kind: Service
metadata:
  name: vibetrader-frontend
  namespace: vibetrader
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default": "vibetrader-frontend-backendconfig"}'
spec:
  selector:
    app: vibetrader-frontend
  ports:
    - name: http
      port: 80
      targetPort: 8080

