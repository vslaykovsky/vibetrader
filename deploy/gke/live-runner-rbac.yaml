apiVersion: v1
kind: ServiceAccount
metadata:
  name: vibetrader-live-controlplane
  namespace: vibetrader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vibetrader-live-controlplane
  namespace: vibetrader
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vibetrader-live-controlplane
  namespace: vibetrader
subjects:
  - kind: ServiceAccount
    name: vibetrader-live-controlplane
    namespace: vibetrader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vibetrader-live-controlplane

