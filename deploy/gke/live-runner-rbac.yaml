apiVersion: v1
kind: ServiceAccount
metadata:
  name: vibetrader-live-controlplane
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vibetrader-live-controlplane
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vibetrader-live-controlplane
subjects:
  - kind: ServiceAccount
    name: vibetrader-live-controlplane
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vibetrader-live-controlplane

