apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibetrader-backend
  namespace: vibetrader
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vibetrader-backend
  template:
    metadata:
      labels:
        app: vibetrader-backend
    spec:
      serviceAccountName: vibetrader-live-controlplane
      containers:
        - name: backend
          image: us-central1-docker.pkg.dev/traderchat/traderchat/vibetrader-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
          env:
            - name: PORT
              value: "8080"
            - name: LIVE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LIVE_RUNNER_IMAGE
              value: us-central1-docker.pkg.dev/traderchat/traderchat/vibetrader-live-runner:latest
            - name: LIVE_RUNNER_CPU
              value: "500m"
            - name: LIVE_RUNNER_MEMORY
              value: "512Mi"
            - name: LIVE_RUNNER_ENV_CONFIGMAP
              value: vibetrader-config
          envFrom:
            - configMapRef:
                name: vibetrader-config
                optional: false

