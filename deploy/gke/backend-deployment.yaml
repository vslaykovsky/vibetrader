apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibetrader-backend
  namespace: vibetrader
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vibetrader-backend
  template:
    metadata:
      labels:
        app: vibetrader-backend
    spec:
      serviceAccountName: vibetrader-live-controlplane
      containers:
        - name: backend
          image: us-central1-docker.pkg.dev/traderchat/traderchat/vibetrader-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "2000m"
              memory: "8Gi"
          envFrom:
            - configMapRef:
                name: vibetrader-config
                optional: false

