apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibetrader-backend
  namespace: vibetrader
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vibetrader-backend
  template:
    metadata:
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
      labels:
        app: vibetrader-backend
    spec:
      serviceAccountName: vibetrader-live-controlplane
      terminationGracePeriodSeconds: 3600
      containers:
        - name: backend
          image: us-central1-docker.pkg.dev/traderchat/traderchat/vibetrader-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "2000m"
              memory: "8Gi"
          env:
            - name: BACKGROUND_JOB_SHUTDOWN_TIMEOUT_SECONDS
              value: "3540"
            - name: GUNICORN_GRACEFUL_TIMEOUT
              value: "3580"
          envFrom:
            - configMapRef:
                name: vibetrader-config
                optional: false

