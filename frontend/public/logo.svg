<svg width="308" height="286" viewBox="166 76 308 286" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="166" y="76" width="308" height="286" fill="#f7f9fc"/>

  <!-- Narrow Chat balloon with larger tail -->
