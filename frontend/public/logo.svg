         L270 270
         H190
         Q170 270 170 245
         V105
         Q170 80 190 80Z"
      fill="#ffffff"
      stroke="#111827"
      stroke-width="5"
      stroke-linejoin="round"
    />
  </g>

  <!-- Candlestick 1 -->
  <g>
    <line x1="250" y1="110" x2="250" y2="240" stroke="#111827" stroke-width="8" stroke-linecap="round"/>
    <rect x="225" y="160" width="50" height="60" rx="6"
          fill="#ffffff" stroke="#111827" stroke-width="5"/>
  </g>

  <!-- Candlestick 2 -->
  <g>
    <line x1="320" y1="100" x2="320" y2="245" stroke="#111827" stroke-width="8" stroke-linecap="round"/>
    <rect x="295" y="160" width="50" height="50" rx="6"
          fill="#111827" stroke="#111827" stroke-width="5"/>
  </g>

  <!-- Candlestick 3 -->
  <g>
    <line x1="390" y1="90" x2="390" y2="250" stroke="#111827" stroke-width="8" stroke-linecap="round"/>
    <rect x="365" y="140" width="50" height="70" rx="6"
          fill="#ffffff" stroke="#111827" stroke-width="5"/>
  </g>
</svg>